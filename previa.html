<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antes de empezar...</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(-45deg, #000000, #1a1a1a, #4a0e1c, #000000);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 400px;
    width: 85%;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    text-align: center;
}

h2 {
    margin-bottom: 30px;
    color: #ff4d6d;
    font-size: 24px;
    letter-spacing: 1px;
}

.steps {
    text-align: left;
    display: inline-block;
    margin-bottom: 20px;
}

p {
    margin: 15px 0;
    font-size: 16px;
    color: #e0e0e0;
    line-height: 1.5;
}

button {
    margin-top: 25px;
    width: 100%;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    background: #ff4d6d;
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: transform 0.2s, background 0.3s;
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
}

button:hover {
    background: #ff758f;
    transform: translateY(-2px);
}

button:active {
    transform: translateY(0);
}

/* ✨ ANIMACIÓN EN CASCADA */
.fade-up {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Tiempos de aparición (cada línea tarda un poquito más) */
.delay-1 { animation-delay: 0.4s; }
.delay-2 { animation-delay: 1.2s; }
.delay-3 { animation-delay: 2.0s; }
.delay-4 { animation-delay: 2.8s; }
.delay-5 { animation-delay: 3.6s; }
.delay-6 { animation-delay: 4.4s; }
.delay-7 { animation-delay: 5.2s; }
.delay-8 { animation-delay: 6.0s; } /* El botón aparece al final */

</style>
</head>

<body>

<div class="container">
    <h2 class="fade-up delay-1">Antes de continuar... </h2>

    <div class="steps">
        <p class="fade-up delay-2">🎧 <b>Ponte auriculares</b> para una mejor experiencia.</p>
        <p class="fade-up delay-3">🔊 <b>Sube el volumen</b> de tu computadora.</p>
        <p class="fade-up delay-4">🌙 <b>Busca un lugar tranquilo.</b></p>
        <p class="fade-up delay-5">✨ <b>Pon la ventana en pantalla completa</b> (F11).</p>
        <p class="fade-up delay-6">🤍 <b>Espero que esto al menos te saque una sonrisa.</b></p>
        <p class="fade-up delay-7">🖱️ <b>Interactúa con el sobre</b> que aparecerá a continuación.</p>
    </div>

    <button class="fade-up delay-8" onclick="entrar()">Estoy lista</button>
</div>

<script>
function entrar() {
    window.location.href = "carta.html";
}
</script>

</body>
</html>
