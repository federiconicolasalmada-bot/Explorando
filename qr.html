<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para vos ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(-45deg, #000000, #1a1a1a, #4a0e1c, #000000);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Contenedor */
.container {
    max-width: 400px;
    width: 85%;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    text-align: center;
    animation: aparecer 1s ease;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    color: #ff4d6d;
    margin-bottom: 20px;
}

p {
    margin: 10px 0;
    color: #ddd;
}

/* Botón */
button {
    margin-top: 20px;
    padding: 14px;
    width: 100%;
    font-size: 18px;
    font-weight: bold;
    background: #ff4d6d;
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff758f;
}

/* BLOQUE OCULTO */
.link-container {
    margin-top: 25px;
    display: none;
    opacity: 0;
    transform: translateY(20px);
}

.link-container.show {
    display: block;
    animation: aparecer 1s forwards;
}

/* LINK */
.url-box {
    margin-top: 15px;
    padding: 12px;
    background: #111;
    border-radius: 10px;
    color: #ff4d6d;
    font-size: 13px;
    border: 1px solid #333;
    user-select: none;
}

/* TEXTO */
.copy-text {
    margin-top: 10px;
    font-size: 14px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

    <h2>Esto es para vos ❤️</h2>

    <p>Buscá un lugar tranquilo 🌙</p>
    <p>Esto es mejor verlo en una computadora 💻</p>
    <p>Tomate unos minutos ✨</p>

    <button onclick="mostrar()">Continuar</button>

    <div class="link-container" id="linkBox">
        <p>Ahora viene lo importante 👇</p>

        <div class="url-box">
            federiconicolasalmada-bot.github.io/Explorando/previa.html
        </div>

        <div class="copy-text">
            Escribilo en tu ordenador 💻
        </div>
    </div>

</div>

<script>
function mostrar() {
    document.getElementById("linkBox").classList.add("show");
}
</script>

</body>
</html>
