<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antes de empezar...</title>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 90%;
}

.link-box {
    background: #111;
    padding: 10px;
    margin-top: 15px;
    border-radius: 10px;
    word-break: break-all;
    font-size: 14px;
}

button {
    margin-top: 15px;
    padding: 10px 15px;
    font-size: 16px;
    background: #ff4d6d;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Antes de continuar...</h2>

    <p>📱 Sube el volumen de tu celular</p>
    <p>🎧 Ponte auriculares</p>
    <p>🌙 Busca un lugar tranquilo</p>
    <p>❤️ Esto es solo para vos</p>

    <p style="margin-top:20px;">Ahora copiá este enlace y abrilo en tu navegador:</p>

    <div class="link-box" id="link">
        https://federiconicolasalmada-bot.github.io/Explorando/carta.html
    </div>

    <button onclick="copiar()">Copiar enlace</button>

</div>

<script>
function copiar() {
    const texto = document.getElementById("link").innerText;
    navigator.clipboard.writeText(texto);
    alert("Link copiado ❤️");
}
</script>

</body>
</html>
